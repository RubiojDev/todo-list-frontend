<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>
    <link rel="icon" type="image/png" sizes="64x64" href="./resources/icon/favicon-64.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./resources/icon/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./resources/icon/favicon-16.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Playpen+Sans:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="./javascript/main.js" defer></script>
</head>
<body data-page="tasks">
    <div id="loaderApp" class="d-flex justify-content-center align-items-center vh-100">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div id="appContent" class="d-none">
      
        <header class="container mt-4">
            <div class="row align-items-center">
    
                <div class="col-sm-2 col-1"></div>
    
                <div class="col-sm-8 col-7 text-center">
                    <h1 class="mb-0">TODO List</h1>
                </div>
    
                <div class="col-sm-2 col-4 text-center dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle" id="btnUsername" type="button" data-bs-toggle="dropdown" aria-expanded="false">Username</button>
    
                    <ul class="dropdown-menu">
                        <li>
                            <button class="dropdown-item" id="btnEditProfile" data-bs-toggle="modal" data-bs-target="#exampleModal">
                                <i class="bi bi-person"></i>
                                Editar Perfil
                            </button>
                        </li>
                        <li>
                            <button class="dropdown-item" id="btnLogout">
                                <i class="bi bi-box-arrow-right"></i>
                                Cerrar Sesión
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </header>
        
        <main class="container mt-5 row-gap-3">
            <section class="row align-items-center mt-4 pt-4">
    
                <h3 class="text-center">Mis Tareas</h3>
    
                <div class="text-center d-flex justify-content-center">
                    <div class="input-group w-50">
                        <input type="text" placeholder="Nueva tarea" class="form-control" id="inputNewTask">
                        <button type="button" class="btn btn-primary" id="btnNewTask">Agregar</button>
                    </div>
                </div>
    
                <div class="text-center d-flex justify-content-center mt-3">
                    <div class="input-group w-50">
                        <span class="input-group-text">Buscar tarea:</span>
                        <input type="text" id="search" class="form-control" placeholder="Nombre de la tarea">
                    </div>
                </div>
    
                <div class="row">
                    
                    <div class="col-md-8 offset-md-2">
                        <div class="accordion mt-3" id="accordionTask">
    
                        </div>
                    </div>
    
                </div>
            </section>
    
            <section class="row mt-5 pt-4">
                <nav aria-label="Page navigation example">
                    <ul id="paginationList" class="pagination justify-content-center">

                    </ul>
                </nav>
            </section>
            
        </main>
    
        <!-- Modal -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">Editar Perfil</h5>

                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
    
                    <div class="modal-body">
                        <div class="row">

                            <label for="staticEmail" class="col-auto col-form-label">Email:</label>

                            <div class="col-5">
                                <input type="text" readonly class="form-control-plaintext" id="inputEmail" value="email@example.com">
                            </div>

                            <div class="col-auto">
                                <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#confirmDeleteAccount">Eliminar Cuenta</button>
                            </div>
                        </div>
                    </div>
    
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    
        <div class="modal fade" id="confirmDeleteTask">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar tarea: <span id="taskNameModalDelete"></span></h5>

                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
    
                    <div class="modal-body">
                        ¿Seguro que quieres eliminar esta tarea?
                    </div>
    
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button class="btn btn-danger" id="btnConfirmDeleteTask">Eliminar</button>
                    </div>
                </div>
            </div>
        </div>
    
        <div class="modal fade" id="confirmDeleteAccount">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar cuenta</h5>

                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
    
                    <div class="modal-body">
                        ¿Seguro que quieres eliminar esta cuenta?<br>
                        Esta acción eliminará todos tus datos permanentemente.
                    </div>
    
                    <div class="modal-footer">
                        <input type="text" id="inputConfirmDeleteAccount" class="form-control" placeholder="Escriba 'ELIMINAR' para confirmar">

                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>

                        <button class="btn btn-danger" id="btnConfirmDeleteAccount">Eliminar cuenta</button>
                    </div>
                </div>
            </div>
        </div>
    
        <div class="modal fade" id="newSubTaskModal">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title">Nueva SubTarea</h5>
                        
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
    
                    <div class="modal-body">
                        <input type="text" id="inputNewSubTask" class="form-control" placeholder="Ingrese su subtarea aquí">
                    </div>
    
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button class="btn btn-primary" id="btnSaveNewSubTask">Crear SubTarea</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="toast position-fixed bottom-0 end-0" id="toast">
            <div class="toast-header text-bg-danger">
                <strong class="me-auto" id="toastTitle">Error</strong>
                <small id="toastTime">1 mins ago</small>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastMessage">
                Message.
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </div>
</body>
</html>
