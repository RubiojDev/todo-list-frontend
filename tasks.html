                    <ul class="pagination justify-content-center">
                        <li class="page-item disabled"><a class="page-link" href="#">Previous</a></li>

        <!-- Modal -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Editar Perfil</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
    
                    <div class="modal-body">
                        <div class="row">
                            <label for="staticEmail" class="col-auto col-form-label">Email</label>
                            <div class="col-5">
                                <input type="text" readonly class="form-control-plaintext" id="staticEmail" value="email@example.com">
                            </div>
                            <div class="col-auto">
                                <button class="btn btn-danger"  data-bs-toggle="modal" data-bs-target="#confirmDeleteAccount">Eliminar Cuenta</button>
                            </div>
                        </div>
                    </div>
    
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div>
    
        <div class="modal fade" id="confirmDeleteTask">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar tarea: <span id="taskNameModalDelete"></span></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
    
                    <div class="modal-body">
                        ¿Seguro que quieres eliminar esta tarea?
                    </div>
    
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button class="btn btn-danger" id="btnConfirmDeleteTask">Eliminar</button>
                    </div>
                </div>
            </div>
        </div>
    
        <div class="modal fade" id="confirmDeleteAccount">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Eliminar cuenta</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
    
                    <div class="modal-body">
                        ¿Seguro que quieres eliminar esta cuenta?<br>
                        Esta acción eliminará todos tus datos permanentemente.
                    </div>
    
                    <div class="modal-footer">
                        <input type="text" class="form-control" placeholder="Escriba 'ELIMINAR' para confirmar">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button class="btn btn-danger">Eliminar cuenta</button>
                    </div>
                </div>
            </div>
        </div>
    
        <div class="modal fade" id="newSubTaskModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Nueva SubTarea</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
    
                    <div class="modal-body">
                        <input type="text" id="inputNewSubTask" class="form-control" placeholder="Ingrese su subtarea aquí">
                    </div>
    
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button class="btn btn-primary" id="btnSaveNewSubTask">Crear SubTarea</button>
                    </div>
                </div>
            </div>
        </div>
