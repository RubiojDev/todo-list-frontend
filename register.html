<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="container mt-4">
        <div class="row align-items-center">

            <div class="col text-center">
                <h1 class="mb-0">TODO List</h1>
            </div>

        </div>
    </header>
    
    <main class="container mt-4">
        <section class="row justify-content-center">

            <div class="col-md-4">
                <div class="card shadow-sm p-4">

                    <h3 class="text-center mb-4">Registrarse</h3>

                    <form id="registerForm">

                        <div class="mb-2">
                            <label for="registerUsername" class="form-label">
                                <i class="bi bi-person"></i>
                                Nombre de Usuario
                            </label>
                            <input type="text" class="form-control" id="registerUsername" placeholder="Ingrese un nombre de usuario" required>
                        </div>

                        <div class="mb-2">
                            <label for="registerEmail" class="form-label">
                                <i class="bi bi-envelope-at"></i>
                                Email
                            </label>
                            <input type="email" class="form-control" id="registerEmail" placeholder="Ingrese su email" required>
                        </div>
                        
                        <div class="mb-2">
                            <label for="registerPassword" class="form-label">
                                <i class="bi bi-lock"></i>
                                Contraseña
                            </label>
                            <input type="password" class="form-control" id="registerPassword" required>
                        </div>

                        <div class="mb-2">
                            <label for="registerConfirmPassword" class="form-label">
                                <i class="bi bi-lock"></i>
                                Confirmar contraseña
                            </label>
                            <input type="password" class="form-control" id="registerConfirmPassword" required>
                        </div>

                        <div class="text-center mb-2">
                            <a href="./index.html">¿Ya tienes cuenta?</a>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Registrarse</button>
                        </div>

                    </form>
                </div>
            </div>

        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
