<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Playpen+Sans:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="./javascript/main.js" defer></script>
</head>
<body data-page="register">
    <header class="container mt-4">
        <div class="row align-items-center">

            <div class="col text-center">
                <h1 class="mb-0">TODO List</h1>
            </div>

        </div>
    </header>
    
    <main class="container mt-4">
        <section class="row justify-content-center">

            <div class="col-md-4">
                <div class="card shadow-sm p-4">

                    <h3 class="text-center mb-4">Registrarse</h3>

                    <form class="needs-validation" id="registerForm" novalidate>

                        <div id="formError" class="alert alert-danger py-2 d-none"></div>

                        <div class="mb-2">
                            <label for="registerUsername" class="form-label">
                                <i class="bi bi-person"></i>
                                Nombre de Usuario
                            </label>
                            <input type="text" class="form-control" id="registerUsername" name="registerUsername" placeholder="Ingrese un nombre de usuario" required>
                            <div id="usernameError" class="invalid-feedback"></div>
                        </div>

                        <div class="mb-2">
                            <label for="registerEmail" class="form-label">
                                <i class="bi bi-envelope-at"></i>
                                Email
                            </label>
                            <input type="email" class="form-control" id="registerEmail" name="registerEmail" placeholder="Ingrese su email" required>
                            <div id="emailError" class="invalid-feedback"></div>
                        </div>
                        
                        <div class="mb-2">
                            <label for="registerPassword" class="form-label">
                                <i class="bi bi-lock"></i>
                                Contraseña
                            </label>
                            <input type="password" class="form-control" id="registerPassword" name="registerPassword" placeholder="Ingrese una contraseña" required>
                            <div id="passwordError" class="invalid-feedback"></div>
                        </div>

                        <div class="mb-2">
                            <label for="registerConfirmPassword" class="form-label">
                                <i class="bi bi-lock"></i>
                                Confirmar contraseña
                            </label>
                            <input type="password" class="form-control" id="registerConfirmPassword" placeholder="Reingrese la contraseña" name="registerConfirmPassword" required>
                            <div id="confirmPasswordError" class="invalid-feedback"></div>
                        </div>

                        <div class="text-center mb-2">
                            <a href="./index.html">¿Ya tienes cuenta?</a>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary" id="btnRegister" name="btnRegister">Registrarse</button>
                        </div>

                    </form>
                </div>
            </div>

        </section>
    </main>

    <!-- Modal -->
    <div class="modal fade" id="registerModal" tabindex="-1" aria-labelledby="registerModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">

                <div class="modal-body">
                    <h5 class="mb-3 text-success"><i class="bi bi-check-lg"></i> Usuario registrado</h5>
                    <p class="mb-0">Registro exitoso</p>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
