<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Playpen+Sans:wght@100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="./javascript/main.js" defer></script>
</head>
<body data-page="login">
    <header class="container mt-4">
        <div class="row align-items-center">

            <div class="col text-center">
                <h1 class="mb-0">TODO List</h1>
            </div>

        </div>
    </header>
    
    <main class="container mt-5">
        <section class="row justify-content-center mt-5">

            <div class="col-md-4">
                <div class="card shadow-sm p-4">

                    <form id="inicioForm">
                        <h3 class="text-center mb-4">Inicio de Sesión</h3>

                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">
                                <i class="bi bi-envelope-at"></i>
                                Email
                            </label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="Ingrese su email" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">
                                <i class="bi bi-lock"></i>
                                Contraseña
                            </label>
                            <input type="password" class="form-control" id="loginPassword" required>
                        </div>

                        <div class="text-center mb-3">
                            <a href="./register.html">¿Aún no tienes cuenta?</a>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
                        </div>

                    </form>
                </div>
            </div>

        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
