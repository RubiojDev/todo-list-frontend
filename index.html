<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header class="container mt-4">
        <div class="row align-items-center">

            <div class="col-sm-2 col-1"></div>

            <div class="col-sm-8 col-7 text-center">
                <h1 class="mb-0">TODO List</h1>
            </div>

            <div class="col-sm-2 col-4 text-center dropdown">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">UserName</button>

                <ul class="dropdown-menu">
                    <li><button class="dropdown-item" data-bs-toggle="modal" data-bs-target="#exampleModal">Editar Perfil</button></li>
                    <li><button class="dropdown-item">Cerrar Sesión</button></li>
                </ul>
            </div>
        </div>
    </header>
    
    <main class="container mt-5 row-gap-3">
        <section class="row align-items-center mt-4 pt-4">

            <h3 class="text-center">Mis Tareas</h3>

            <div class="text-center d-flex justify-content-center">
                <div class="input-group w-50">
                    <input type="text" placeholder="Nueva tarea" class="form-control">
                    <button type="button" class="btn btn-primary">Agregar</button>
                </div>
            </div>

            <div class="text-center d-flex justify-content-center mt-3">
                <div class="input-group w-50">
                    <span class="input-group-text">Buscar tarea:</span>
                    <input type="text" id="search" class="form-control" placeholder="Nombre de la tarea">
                </div>
            </div>

            <div class="row">
                

                <div class="col-md-8 offset-md-2">
                    <div class="accordion mt-3" id="accordionExample">

                        <!-- TAREA 1 -->
                        <div class="accordion-item shadow-sm mb-2">
                            <div class="d-flex align-items-start">

                                <!-- CONTENIDO -->
                                <div class="flex-grow-1">
                                    <h2 class="accordion-header">
                                        <div class="input-group">

                                            <span class="badge text-bg-secondary">2</span>

                                            <input type="text" class="form-control" value="Primera tarea">
                                        
                                            <button class="accordion-button btn-small-personalised w-auto" data-bs-toggle="collapse" data-bs-target="#collapseOne"></button>
                                        </div>
                                    </h2>

                                    <div id="collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                                        <div class="accordion-body">
                                            <div class="input-group mb-2">
                                                <div class="input-group-text">
                                                    <input type="checkbox">
                                                </div>

                                                <input type="text" class="form-control" value="Primer Item">
                                        
                                                <button class="btn btn-danger">Eliminar</button>
                                            </div>
                                            <div class="input-group mb-2">
                                                <div class="input-group-text">
                                                    <input type="checkbox">
                                                </div>

                                                <input type="text" class="form-control" value="Segundo Item">
                                        
                                                <button class="btn btn-danger">Eliminar</button>
                                            </div>
                                            <div class="input-group mb-2">
                                                <div class="input-group-text">
                                                    <input type="checkbox" checked>
                                                </div>

                                                <input type="text" class="form-control text-strike" value="Tercer Item">
                                        
                                                <button class="btn btn-danger">Eliminar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- BOTÓN -->
                                 <div class="ms-2 width-110">
                                    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#newSubTaskModal">Nueva</button>
                                </div>
                                
                                <div class="ms-2 width-110">
                                    <button class="btn btn-success w-100">Completado</button>
                                </div>

                                <div class="ms-2 width-110">
                                    <button class="btn btn-danger w-100" data-bs-toggle="modal" data-bs-target="#confirmDeleteTask">Eliminar</button>
                                </div>
                            </div>
                        </div>

                        <!-- TAREA 2 -->
                        <div class="accordion-item shadow-sm mb-2">
                            <div class="d-flex align-items-start">

                                <!-- CONTENIDO -->
                                <div class="flex-grow-1">
                                    <h2 class="accordion-header">
                                        <div class="input-group">

                                            <span class="badge text-bg-secondary">3</span>

                                            <input type="text" class="form-control" value="Primera tarea">
                                        
                                            <button class="accordion-button btn-small-personalised w-auto" data-bs-toggle="collapse" data-bs-target="#collapseTwo"></button>
                                        </div>
                                    </h2>

                                    <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                                        <div class="accordion-body">
                                            <div class="input-group mb-2">
                                                <div class="input-group-text">
                                                    <input type="checkbox">
                                                </div>

                                                <input type="text" class="form-control" value="Primer Item">
                                        
                                                <button class="btn btn-danger">Eliminar</button>
                                            </div>
                                            <div class="input-group mb-2">
                                                <div class="input-group-text">
                                                    <input type="checkbox">
                                                </div>

                                                <input type="text" class="form-control" value="Segundo Item">
                                        
                                                <button class="btn btn-danger">Eliminar</button>
                                            </div>
                                            <div class="input-group mb-2">
                                                <div class="input-group-text">
                                                    <input type="checkbox">
                                                </div>

                                                <input type="text" class="form-control" value="Tercer Item">
                                        
                                                <button class="btn btn-danger">Eliminar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- BOTÓN -->
                                 <div class="ms-2 width-110">
                                    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#newSubTaskModal">Nueva</button>
                                </div>
                                
                                <div class="ms-2 width-110">
                                    <button class="btn btn-success w-100">Completado</button>
                                </div>
                                
                                <div class="ms-2 width-110">
                                    <button class="btn btn-danger w-100" data-bs-toggle="modal" data-bs-target="#confirmDeleteTask">Eliminar</button>
                                </div>
                            </div>
                        </div>

                        <!-- TAREA 3 -->
                        <div class="accordion-item shadow-sm mb-2">
                            <div class="d-flex align-items-start">

                                <!-- CONTENIDO -->
                                <div class="flex-grow-1">
                                    <h2 class="accordion-header">
                                        <div class="input-group">

                                            <span class="badge text-bg-secondary">0</span>

                                            <input type="text" class="form-control bg-success" value="Tercera tarea">
                                        
                                            <button class="accordion-button btn-small-personalised w-auto" data-bs-toggle="collapse" data-bs-target="#collapseThree"></button>
                                        </div>
                                    </h2>

                                    <div id="collapseThree" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                                        <div class="accordion-body">
                                            <div class="input-group mb-2">
                                                <div class="input-group-text">
                                                    <input type="checkbox">
                                                </div>

                                                <input type="text" class="form-control" value="Primer Item">
                                        
                                                <button class="btn btn-danger">Eliminar</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- BOTÓN -->
                                 <div class="ms-2 width-110">
                                    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#newSubTaskModal">Nueva</button>
                                </div>
                                
                                <div class="ms-2 width-110">
                                    <button class="btn btn-success w-100">Completado</button>
                                </div>
                                
                                <div class="ms-2 width-110">
                                    <button class="btn btn-danger w-100" data-bs-toggle="modal" data-bs-target="#confirmDeleteTask">Eliminar</button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </section>

        <section class="row mt-5 pt-4">
            <nav aria-label="Page navigation example">
                <ul class="pagination justify-content-center">
                    <li class="page-item disabled"><a class="page-link" href="#">Previous</a></li>
                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                    <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">3</a></li>
                    <li class="page-item"><a class="page-link" href="#">Next</a></li>
                </ul>
            </nav>
        </section>
        
    </main>

    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Perfil</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <div class="row">
                        <label for="staticEmail" class="col-auto col-form-label">Email</label>
                        <div class="col-5">
                            <input type="text" readonly class="form-control-plaintext" id="staticEmail" value="email@example.com">
                        </div>
                        <div class="col-auto">
                            <button class="btn btn-danger"  data-bs-toggle="modal" data-bs-target="#confirmDeleteAccount">Eliminar Cuenta</button>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmDeleteTask">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Eliminar tarea</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    ¿Seguro que quieres eliminar esta tarea?
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-danger">Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmDeleteAccount">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Eliminar cuenta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    ¿Seguro que quieres eliminar esta cuenta?<br>
                    Esta acción eliminará todos tus datos permanentemente.
                </div>

                <div class="modal-footer">
                    <input type="text" class="form-control" placeholder="Escriba 'ELIMINAR' para confirmar">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-danger">Eliminar cuenta</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="newSubTaskModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nueva SubTarea</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <input type="text" class="form-control" placeholder="Ingrese su subtarea aquí">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary">Crear SubTarea</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
